name: Deploy SQM Review to GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 拉取仓库代码
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sqm-review/package-lock.json

      # 安装依赖
      - name: Install dependencies
        working-directory: sqm-review
        run: npm ci

      # 构建 Vue 项目
      - name: Build project
        working-directory: sqm-review
        run: npm run build

      # 上传 dist
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sqm-review/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4