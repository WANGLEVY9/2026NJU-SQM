name: Deploy SQM Review to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'sqm-review/**'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: sqm-review-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sqm-review/package-lock.json

      # 安装依赖
      - name: Install dependencies
        working-directory: sqm-review
        run: npm ci

      # 构建 Vue 项目
      - name: Build project
        working-directory: sqm-review
        run: npm run build

      # 配置 Pages 环境
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 上传构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sqm-review/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
